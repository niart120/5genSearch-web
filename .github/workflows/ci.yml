name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.14.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install wasm-opt (binaryen)
        run: |
          curl -L -o binaryen.tar.gz https://github.com/WebAssembly/binaryen/releases/download/version_129/binaryen-version_129-x86_64-linux.tar.gz
          tar -xzf binaryen.tar.gz
          echo "$PWD/binaryen-version_129/bin" >> $GITHUB_PATH

      - name: Build WASM
        run: pnpm build:wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: |
            src/wasm/
            public/wasm/
          retention-days: 1

  lint-ts:
    name: Lint (TypeScript)
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-pkg

      - name: oxlint
        run: pnpm lint:ts

      - name: oxfmt check
        run: pnpm format:check:ts

      - name: TypeScript check
        run: pnpm exec tsc -b --noEmit

  lint-rust:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: rustfmt check
        run: cargo fmt --manifest-path wasm-pkg/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path wasm-pkg/Cargo.toml --all-targets -- -D warnings

  test-ts:
    name: Test (TypeScript)
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-pkg

      - name: Run tests
        run: pnpm test:run

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --manifest-path wasm-pkg/Cargo.toml
